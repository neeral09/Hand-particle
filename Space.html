<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gesture Particles - Interactive 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 10; }
        video { position: absolute; bottom: 20px; right: 20px; width: 200px; border-radius: 10px; opacity: 0.6; transform: scaleX(-1); }
        .hint { font-size: 0.8rem; opacity: 0.7; }
    </style>
</head>
<body>

<div id="ui">
    <h1>Gesture Particles</h1>
    <p>Status: <span id="status" style="color: #00ff88;">Initializing AI...</span></p>
    <p class="hint">Pinch to attract • Open palm to explode • Hold "V" to morph</p>
</div>
<video id="input_video"></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

<script>
    const videoElement = document.getElementById('input_video');
    const statusText = document.getElementById('status');
    
    // --- THREE.JS SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const particleCount = 8000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);

    for (let i = 0; i < particleCount * 3; i++) {
        positions[i] = (Math.random() - 0.5) * 10;
        colors[i] = Math.random();
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({ size: 0.05, vertexColors: true, transparent: true, opacity: 0.8 });
    const points = new THREE.Points(geometry, material);
    scene.add(points);

    camera.position.z = 5;

    // --- SHAPE TEMPLATES ---
    function getHeartPoint(t) {
        // Heart Equation: x = 16sin^3(t), y = 13cos(t) - 5cos(2t)...
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        return new THREE.Vector3(x * 0.1, y * 0.1, 0);
    }

    // --- MEDIAPIPE HANDS ---
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    hands.onResults((results) => {
        statusText.innerText = results.multiHandLandmarks.length > 0 ? "Hand Detected" : "Looking for Hand...";
        
        if (results.multiHandLandmarks && results.multiHandLandmarks[0]) {
            const hand = results.multiHandLandmarks[0];
            const indexTip = hand[8];
            const thumbTip = hand[4];

            // Convert MediaPipe coords to 3D Space
            const targetX = (indexTip.x - 0.5) * 10;
            const targetY = -(indexTip.y - 0.5) * 10;

            // Simple Pinch Detection
            const distance = Math.sqrt(Math.pow(indexTip.x - thumbTip.x, 2) + Math.pow(indexTip.y - thumbTip.y, 2));
            
            const posAttr = geometry.attributes.position;
            for (let i = 0; i < particleCount; i++) {
                let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;

                if (distance < 0.05) { // Attraction
                    posAttr.array[ix] += (targetX - posAttr.array[ix]) * 0.1;
                    posAttr.array[iy] += (targetY - posAttr.array[iy]) * 0.1;
                } else { // Idle drift
                    posAttr.array[ix] += Math.sin(Date.now() * 0.001 + i) * 0.01;
                }
            }
            posAttr.needsUpdate = true;
        }
    });

    const cam = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 640, height: 480
    });
    cam.start();

    // --- RENDER LOOP ---
    function animate() {
        requestAnimationFrame(animate);
        TWEEN.update();
        points.rotation.y += 0.002;
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
